<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Personal Dashboard{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json?v={{ asset_v() }}" crossorigin="use-credentials">
  <meta name="theme-color" content="#4a9c6d">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png?v={{ asset_v() }}">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png?v={{ asset_v() }}">

  <link rel="stylesheet" href="/static/css/vendor/gridstack.min.css?v={{ asset_v() }}">
  <link rel="stylesheet" href="/static/css/vendor/gridstack-extra.min.css?v={{ asset_v() }}">
  <link rel="stylesheet" href="/static/css/style.css?v={{ asset_v() }}">
  {% for href in plugin_stylesheets %}
  <link rel="stylesheet" href="{{ href }}?v={{ asset_v() }}">
  {% endfor %}

  {% block head_extra %}{% endblock %}
</head>
<body hx-ext="sse" sse-connect="/events">
  <header class="pd-header">
    <h1><a href="/">Personal Dashboard</a></h1>
    <nav class="pd-nav">
      <a href="/notifications">Notifications log</a>
      <button id="pd-grid-edit" type="button">Edit layout</button>
    </nav>
    <div class="pd-push-controls">
      <span id="pd-push-status">checking…</span>
      <button id="pd-push-enable" type="button" hidden>Enable notifications</button>
      <button id="pd-push-disable" type="button" hidden>Disable</button>
      <button id="pd-push-test" type="button" hidden>Send test</button>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/vendor/htmx.min.js?v={{ asset_v() }}"></script>
  <script src="/static/js/vendor/htmx-sse.js?v={{ asset_v() }}"></script>
  <script src="/static/js/vendor/gridstack-all.js?v={{ asset_v() }}"></script>
  <script src="/static/js/sse-managed.js?v={{ asset_v() }}"></script>
  <script src="/static/js/dashboard-helpers.js?v={{ asset_v() }}"></script>
  <script src="/static/js/push.js?v={{ asset_v() }}"></script>
  {% block body_extra %}{% endblock %}
</body>
</html>
