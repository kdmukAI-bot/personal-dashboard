{% extends "base.html" %}

{% block content %}
<div class="pd-grid grid-stack">
  <!-- Built-in: recent notifications -->
  <div class="grid-stack-item" gs-id="notifications" gs-w="3" gs-h="2" gs-min-w="2" gs-min-h="1">
    <div class="grid-stack-item-content pd-widget">
      <div id="pd-notifications-widget"
           hx-get="/widgets/notifications"
           hx-trigger="sse:notification">
        {% include "notifications/widget.html" %}
      </div>
    </div>
  </div>

  {% for mod in loaded_modules %}
  <div class="grid-stack-item"
       gs-id="{{ mod.name }}"
       gs-w="{{ mod.widget.default_w | default(3) }}"
       gs-h="{{ mod.widget.default_h | default(2) }}"
       gs-min-w="{{ mod.widget.min_w | default(2) }}"
       gs-min-h="{{ mod.widget.min_h | default(1) }}"
       {% if mod.widget.no_resize %}gs-no-resize="true"{% endif %}>
    <div class="grid-stack-item-content pd-widget">
      <div id="{{ mod.name }}-widget">
        {{ rendered_widgets[mod.name] | safe }}
      </div>
    </div>
  </div>
  {% endfor %}
</div>

{% if not loaded_modules %}
<p class="pd-empty">No external modules enabled. Install a plugin to add widgets.</p>
{% endif %}
{% endblock %}
